apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sim.fullname" . }}-nginx-config
  labels:
    {{- include "sim.componentLabels" (dict "ctx" . "component" "nginx") | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
        use epoll;
        multi_accept on;
    }

    http {
        client_body_temp_path /tmp/client_temp;
        proxy_temp_path       /tmp/proxy_temp;
        fastcgi_temp_path     /tmp/fastcgi_temp;
        uwsgi_temp_path       /tmp/uwsgi_temp;
        scgi_temp_path        /tmp/scgi_temp;

        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';
        access_log /var/log/nginx/access.log main;

        sendfile        on;
        tcp_nopush      on;
        tcp_nodelay     on;
        keepalive_timeout 65;

        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml application/json application/javascript application/xml;

        # --- Upstreams (auto-generated from services map) ---
        {{- range $name, $svc := .Values.services }}
        upstream {{ $name }} {
            server {{ include "sim.fullname" $ }}-{{ $name }}.{{ $.Release.Namespace }}.svc.cluster.local:{{ $svc.port }};
            keepalive 32;
        }
        {{- end }}

        server {
            listen {{ .Values.nginx.port }};
            server_name {{ include "sim.fqdn" . }};

            location /health {
                access_log off;
                return 200 'OK';
                add_header Content-Type text/plain;
            }

            # --- Location blocks (auto-generated from services map) ---
            {{- range $name, $svc := .Values.services }}
            location {{ $svc.pathPrefix }}/ {
                proxy_pass http://{{ $name }}/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Connection "";
                proxy_connect_timeout 30s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }
            {{- end }}

            location /ws/ {
                proxy_pass http://simulator-server/ws/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_read_timeout 86400;
            }

            location / {
                return 200 '{"status":"ok","user":"{{ .Values.userId }}","oem":"{{ .Values.oemId }}"}';
                add_header Content-Type application/json;
            }
        }
    }
