{{- if .Values.targetAndroid.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "simulator-platform.fullname" . }}-android
  labels:
    {{- $ctx := dict "Values" .Values "Chart" .Chart "Release" .Release "component" "target-android" }}
    {{- include "simulator-platform.componentLabels" $ctx | nindent 4 }}
spec:
  replicas: {{ .Values.targetAndroid.replicas }}
  selector:
    matchLabels:
      {{- include "simulator-platform.componentSelectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "simulator-platform.componentSelectorLabels" $ctx | nindent 8 }}
    spec:
      serviceAccountName: {{ include "simulator-platform.serviceAccountName" . }}
      {{- with .Values.hybridNode.nodeSelector }}
      {{- if $.Values.hybridNode.enabled }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.hybridNode.tolerations }}
      {{- if $.Values.hybridNode.enabled }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: target-android
          image: {{ include "simulator-platform.image" (dict "root" . "image" .Values.targetAndroid.image) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.targetAndroid.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.targetAndroid.resources | nindent 12 }}
          {{- with .Values.targetAndroid.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
