apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sim.fullname" . }}-nginx
  labels:
    {{- include "sim.componentLabels" (dict "ctx" . "component" "nginx") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "sim.componentSelector" (dict "ctx" . "component" "nginx") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sim.componentSelector" (dict "ctx" . "component" "nginx") | nindent 8 }}
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/configmap-nginx.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "sim.serviceAccountName" . }}
      {{- include "sim.nodeSelector" . | nindent 6 }}
      {{- include "sim.tolerations" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.nginx.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: var-log-nginx
              mountPath: /var/log/nginx
            - name: var-cache-nginx
              mountPath: /var/cache/nginx
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "sim.fullname" . }}-nginx-config
        - name: tmp
          emptyDir: {}
        - name: var-log-nginx
          emptyDir: {}
        - name: var-cache-nginx
          emptyDir: {}
