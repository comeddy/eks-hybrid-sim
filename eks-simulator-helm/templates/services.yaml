# ============================================================
# Nginx Proxy Service (ALB Target)
# ============================================================
{{- if .Values.nginxProxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "simulator-platform.fullname" . }}-nginx
  labels:
    {{- $ctx := dict "Values" .Values "Chart" .Chart "Release" .Release "component" "nginx-proxy" }}
    {{- include "simulator-platform.componentLabels" $ctx | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.nginxProxy.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "simulator-platform.componentSelectorLabels" $ctx | nindent 4 }}
{{- end }}
