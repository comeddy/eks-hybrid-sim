{{- if .Values.targetCluster.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "simulator-platform.fullname" . }}-cluster
  labels:
    {{- $ctx := dict "Values" .Values "Chart" .Chart "Release" .Release "component" "target-cluster" }}
    {{- include "simulator-platform.componentLabels" $ctx | nindent 4 }}
spec:
  replicas: {{ .Values.targetCluster.replicas }}
  selector:
    matchLabels:
      {{- include "simulator-platform.componentSelectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "simulator-platform.componentSelectorLabels" $ctx | nindent 8 }}
    spec:
      serviceAccountName: {{ include "simulator-platform.serviceAccountName" . }}
      {{- with .Values.hybridNode.nodeSelector }}
      {{- if $.Values.hybridNode.enabled }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.hybridNode.tolerations }}
      {{- if $.Values.hybridNode.enabled }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: target-cluster
          image: {{ include "simulator-platform.image" (dict "root" . "image" .Values.targetCluster.image) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.targetCluster.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.targetCluster.resources | nindent 12 }}
          {{- with .Values.targetCluster.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
