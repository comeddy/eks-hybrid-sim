{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sim.fullname" $ }}-{{ $name }}
  labels:
    {{- include "sim.componentLabels" (dict "ctx" $ "component" $name) | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "sim.componentSelector" (dict "ctx" $ "component" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sim.componentSelector" (dict "ctx" $ "component" $name) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "sim.serviceAccountName" $ }}
      {{- include "sim.nodeSelector" $ | nindent 6 }}
      {{- include "sim.tolerations" $ | nindent 6 }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $name }}
          image: {{ include "sim.image" (dict "registry" $.Values.imageRegistry "repository" $svc.image.repository "tag" $svc.image.tag) }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          securityContext:
            {{- toYaml $.Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          {{- if $svc.probeDefaults }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          {{- with $svc.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
