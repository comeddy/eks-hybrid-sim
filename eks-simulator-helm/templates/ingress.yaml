{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sim.fullname" . }}
  labels:
    {{- include "sim.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    # ALB Controller
    alb.ingress.kubernetes.io/group.name: {{ include "sim.albGroupName" . | quote }}
    alb.ingress.kubernetes.io/group.order: {{ .Values.ingress.groupOrder | quote }}
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.annotations | dig "alb.ingress.kubernetes.io/scheme" "internet-facing" | quote }}
    alb.ingress.kubernetes.io/target-type: {{ .Values.ingress.annotations | dig "alb.ingress.kubernetes.io/target-type" "ip" | quote }}
    alb.ingress.kubernetes.io/listen-ports: {{ .Values.ingress.annotations | dig "alb.ingress.kubernetes.io/listen-ports" "[{\"HTTPS\":443}]" | quote }}
    alb.ingress.kubernetes.io/ssl-redirect: {{ .Values.ingress.annotations | dig "alb.ingress.kubernetes.io/ssl-redirect" "443" | quote }}
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.annotations | dig "alb.ingress.kubernetes.io/healthcheck-path" "/health" | quote }}
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: {{ .Values.ingress.annotations | dig "alb.ingress.kubernetes.io/healthcheck-interval-seconds" "30" | quote }}
    alb.ingress.kubernetes.io/success-codes: {{ .Values.ingress.annotations | dig "alb.ingress.kubernetes.io/success-codes" "200" | quote }}
    alb.ingress.kubernetes.io/tags: "OEM={{ .Values.oemId }},User={{ .Values.userId }},ManagedBy=helm"
    {{- if .Values.ingress.securityGroupId }}
    alb.ingress.kubernetes.io/security-groups: {{ .Values.ingress.securityGroupId | quote }}
    alb.ingress.kubernetes.io/manage-backend-security-group-rules: "true"
    {{- end }}
    {{- if .Values.ingress.certArn }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certArn | quote }}
    {{- end }}
    # External-DNS: OEM의 Hosted Zone에 A 레코드 자동 생성
    external-dns.alpha.kubernetes.io/hostname: {{ include "sim.fqdn" . }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ include "sim.fqdn" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sim.fullname" . }}-nginx
                port:
                  number: {{ .Values.nginx.port }}
{{- end }}
