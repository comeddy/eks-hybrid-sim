{{- if .Values.nginxProxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "simulator-platform.fullname" . }}-nginx
  labels:
    {{- $ctx := dict "Values" .Values "Chart" .Chart "Release" .Release "component" "nginx-proxy" }}
    {{- include "simulator-platform.componentLabels" $ctx | nindent 4 }}
spec:
  replicas: {{ .Values.nginxProxy.replicas }}
  selector:
    matchLabels:
      {{- include "simulator-platform.componentSelectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "simulator-platform.componentSelectorLabels" $ctx | nindent 8 }}
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/configmap-nginx.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "simulator-platform.serviceAccountName" . }}
      {{- with .Values.hybridNode.nodeSelector }}
      {{- if $.Values.hybridNode.enabled }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.hybridNode.tolerations }}
      {{- if $.Values.hybridNode.enabled }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: nginx
          image: "{{ .Values.nginxProxy.image.repository }}:{{ .Values.nginxProxy.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.nginxProxy.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.nginxProxy.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: var-log-nginx
              mountPath: /var/log/nginx
            - name: var-cache-nginx
              mountPath: /var/cache/nginx
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "simulator-platform.fullname" . }}-nginx-config
        - name: tmp
          emptyDir: {}
        - name: var-log-nginx
          emptyDir: {}
        - name: var-cache-nginx
          emptyDir: {}
{{- end }}
