# ============================================================
# User / OEM 식별자 (Terraform에서 주입)
# ============================================================
userId: "user-a"
oemId: "hyundai"

# ECR 레지스트리 주소
imageRegistry: "123456789012.dkr.ecr.ap-northeast-2.amazonaws.com"
imagePullPolicy: IfNotPresent

# ============================================================
# Ingress / ALB Configuration
# ============================================================
ingress:
  enabled: true
  className: alb
  baseDomain: "example.com"
  certArn: ""
  # ALB에 연결할 Security Group ID (0.0.0.0/0 금지, CloudFront prefix list만 허용)
  securityGroupId: ""

  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/success-codes: "200"

  # OEM별 ALB 공유 그룹 (템플릿에서 ajt-{oemId}로 자동 생성)
  groupOrder: "100"

# ============================================================
# Hybrid Node Configuration
# ============================================================
hybridNode:
  enabled: true
  nodeSelector:
    eks.amazonaws.com/compute-type: hybrid
  tolerations:
    - key: "eks.amazonaws.com/compute-type"
      operator: "Equal"
      value: "hybrid"
      effect: "NoSchedule"

# ============================================================
# Common Pod Settings
# ============================================================
commonLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ============================================================
# Nginx Reverse Proxy
# ============================================================
nginx:
  image:
    repository: nginx
    tag: "1.25-alpine"
  port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ============================================================
# Backend Services (동적 정의)
#
# 서비스 추가: 이 map에 항목을 추가하면 자동으로
#   - Deployment + Service 생성
#   - Nginx location block 추가
#   - NOTES.txt에 엔드포인트 표시
#
# pathPrefix: nginx에서 이 prefix로 들어온 요청을 해당 서비스로 프록시
# ============================================================
services:
  simulator-can:
    pathPrefix: "/can"
    image:
      repository: simulator-can
      tag: "latest"
    port: 8001
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    env: []
    probeDefaults: true

  simulator-server:
    pathPrefix: "/server"
    image:
      repository: simulator-server
      tag: "latest"
    port: 8002
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 1Gi
    env: []
    probeDefaults: true

  simulator-vehicle:
    pathPrefix: "/vehicle"
    image:
      repository: simulator-vehicle
      tag: "latest"
    port: 8003
    replicas: 1
    resources:
      requests:
        cpu: 300m
        memory: 384Mi
      limits:
        cpu: 1500m
        memory: 768Mi
    env: []
    probeDefaults: true

  target-android:
    pathPrefix: "/android"
    image:
      repository: target-android
      tag: "latest"
    port: 8004
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi
    env: []
    probeDefaults: true

  target-cluster:
    pathPrefix: "/cluster"
    image:
      repository: target-cluster
      tag: "latest"
    port: 8005
    replicas: 1
    resources:
      requests:
        cpu: 400m
        memory: 512Mi
      limits:
        cpu: 1500m
        memory: 1Gi
    env: []
    probeDefaults: true

# ============================================================
# Service Account
# ============================================================
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ============================================================
# Pod Disruption Budget
# ============================================================
podDisruptionBudget:
  enabled: false
  minAvailable: 1
