# ============================================================
# Example: Hyundai OEM - User A
# Domain: user-a.hyundai.example.com
# ============================================================

userId: "user-a"
oemId: "hyundai"

imageRegistry: "123456789012.dkr.ecr.ap-northeast-2.amazonaws.com"

ingress:
  enabled: true
  className: alb
  baseDomain: "example.com"
  annotations:
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-northeast-2:123456789012:certificate/xxxx-yyyy-zzzz"

hybridNode:
  enabled: true
  nodeSelector:
    eks.amazonaws.com/compute-type: hybrid
  tolerations:
    - key: "eks.amazonaws.com/compute-type"
      operator: "Equal"
      value: "hybrid"
      effect: "NoSchedule"

# Component image tags
simulatorCan:
  enabled: true
  image:
    tag: "v1.2.0"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

simulatorServer:
  enabled: true
  image:
    tag: "v1.3.0"
  replicas: 1

simulatorVehicle:
  enabled: true
  image:
    tag: "v1.1.0"

targetAndroid:
  enabled: true
  image:
    tag: "v2.0.0"

targetCluster:
  enabled: true
  image:
    tag: "v1.0.0"
