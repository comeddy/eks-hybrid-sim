# ============================================================
# helm template 로컬 테스트용
# helm template test ../../eks-simulator-helm -f values-hyundai-user-a.yaml
#
# 실제 배포는 Terraform이 set으로 주입하므로 이 파일은 사용하지 않음.
# Terraform tfvars 예제 → envs/dev/terraform.tfvars.example 참고
# ============================================================
userId: "user-a"
oemId: "hyundai"
imageRegistry: "123456789012.dkr.ecr.ap-northeast-2.amazonaws.com"

ingress:
  baseDomain: "sim.example.com"
  certArn: "arn:aws:acm:ap-northeast-2:123456789012:certificate/xxxx-yyyy-zzzz"

hybridNode:
  enabled: true

# 태그만 오버라이드, 나머지는 values.yaml 기본값 사용
services:
  simulator-can:
    image:
      tag: "v1.2.0"
  simulator-server:
    image:
      tag: "v1.3.0"
  simulator-vehicle:
    image:
      tag: "v1.1.0"
  target-android:
    image:
      tag: "v2.0.0"
  target-cluster:
    image:
      tag: "v1.0.0"
