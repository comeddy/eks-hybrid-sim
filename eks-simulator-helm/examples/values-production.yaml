# ============================================================
# Production Environment Override
# 프로덕션 환경용 공통 설정 (OEM/User별 values와 함께 사용)
# ============================================================

# 이미지 풀 정책
imagePullPolicy: Always

# 더 강화된 보안 설정
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Nginx Proxy - Production 설정
nginxProxy:
  enabled: true
  replicas: 2  # HA 구성
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

# Simulator 컴포넌트 - Production 리소스
simulatorCan:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1Gi

simulatorServer:
  enabled: true
  replicas: 2  # HA 구성
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 2Gi

simulatorVehicle:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1Gi

# Target 컴포넌트 - Production 리소스
targetAndroid:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 4Gi

targetCluster:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

# Pod Disruption Budget 활성화
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# 모니터링 활성화
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /metrics
