# ============================================================
# Production 환경 오버레이
# helm template test ../../eks-simulator-helm -f values-hyundai-user-a.yaml -f values-production.yaml
#
# 보안 강화, PDB 활성화 등 운영 환경 공통 설정.
# OEM/User별 values 위에 -f로 덮어씌워 사용.
# ============================================================
imagePullPolicy: Always

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

nginx:
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 512Mi }

podDisruptionBudget:
  enabled: true
  minAvailable: 1
